<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Target + SLAM Persistente</title>
  
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" crossorigin="anonymous" async data-preload-chunks="slam,image"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* Oculta as marcas d'água igual no seu código */
    div[data-8thwall-branding], .xrextras-branding { display: none !important; }
  </style>
</head>
<body>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; antialias: true"
    xrweb="local-tracking: true; imageTargetFolder: image/image-targets;">

    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <a-named-image-target name="seu-panfleto" alvo-persistente>
      
      <a-gltf-model 
        src="https://cdn.aframe.io/gltf-models/duck/Duck.gltf"
        scale="0.1 0.1 0.1" 
        position="0 0 0"
        rotation="0 0 0">
      </a-gltf-model>

    </a-named-image-target>

  </a-scene>

  <script src="./bundle.js"></script>

</body>
</html>
