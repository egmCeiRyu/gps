<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR - Element Fire</title>

    <!-- 1. Engine binary 8th Wall via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
            async crossorigin="anonymous"
            data-preload-chunks="image">
    </script>

    <!-- 2. Landing page -->
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js"
            crossorigin="anonymous">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: sans-serif;
        }

        #status {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            z-index: 9999;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }

            #status.found {
                background: rgba(15,130,86,0.9);
            }

            #status.error {
                background: rgba(200,0,0,0.9);
            }

        #canvas-container {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div id="status">🔍 Aponte para a imagem do fogo...</div>
    <div id="canvas-container"></div>

    <script src="./bundle.js"></script>

</body>
</html>
