<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>AR - Element Fire</title>

  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="image, slam"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; }
    #status {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 20px;
      z-index: 9999;
      text-align: center;
      pointer-events: none;
    }
    #status.found { background: rgba(15,130,86,0.9); }
  </style>
</head>
<body>

  <div id="status">🔍 Aponte para a imagem do fogo...</div>

  <a-scene
    renderer="colorManagement: true; antialias: true"
    xrweb="local-tracking: true; imageTargetFolder: ./;">

    <a-camera position="0 1.6 0"></a-camera>

    <a-named-image-target name="20_Element_Fire" alvo-persistente>
      <a-box
        id="cubo"
        position="0 0.2 0"
        scale="0.3 0.3 0.3"
        material="color: #ff6600; opacity: 0.95;"
        visible="false"
        animation="property: rotation; to: 0 360 0; dur: 2000; loop: true; easing: linear">
      </a-box>
    </a-named-image-target>

  </a-scene>

  <script src="bundle.js"></script>

</body>
</html>
