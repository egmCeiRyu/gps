<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>AR - Element Fire (Corrigido)</title>

  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async="true" data-preload-chunks="slam,image"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; }
    #status {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 20px;
      z-index: 9999;
      text-align: center;
      pointer-events: none;
    }
    #status.found { background: rgba(15,130,86,0.9); }
  </style>
</head>
<body>

  <div id="status">🔍 Aponte para a imagem...</div>

  <a-scene
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; antialias: true"
    xrweb="local-tracking: true; imageTargetFolder: ./;">

    <a-camera position="0 1.6 0"></a-camera>

    <a-named-image-target name="20_Element_Fire" alvo-persistente>
      <a-box
        id="cubo"
        position="0 0.2 0"
        scale="0.3 0.3 0.3"
        material="color: #00AAFF;"
        visible="false">
      </a-box>
    </a-named-image-target>

  </a-scene>

  <script src="bundle.js"></script>

</body>
</html>
