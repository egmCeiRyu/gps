<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR Sky Object</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; background: #000; }

    #ui {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 999;
      padding: 12px 16px;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #status {
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    #hint {
      background: rgba(31, 158, 117, 0.85);
      color: #fff;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      text-align: center;
    }

    #btn-photo {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btn-photo::after {
      content: '';
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      display: block;
    }
    #btn-photo:active { transform: translateX(-50%) scale(0.95); }

    #shape-picker {
      position: absolute;
      bottom: 44px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .shape-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .shape-btn.active {
      background: rgba(127,119,221,0.8);
      border-color: #fff;
    }

    #color-picker {
      position: absolute;
      bottom: 44px;
      left: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .color-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .color-btn.active { border-color: #fff; transform: scale(1.15); }

    #flash {
      position: absolute;
      inset: 0;
      background: #fff;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.06s;
    }

    #marker-ref {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 12px;
      text-align: center;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="ui">
    <div id="status">Point camera at the Hiro marker</div>
    <div id="hint">Print the marker below — object appears above it</div>
  </div>

  <div id="color-picker">
    <div class="color-btn active" style="background:#7F77DD" onclick="setColor('#7F77DD', this)"></div>
    <div class="color-btn" style="background:#1D9E75" onclick="setColor('#1D9E75', this)"></div>
    <div class="color-btn" style="background:#D85A30" onclick="setColor('#D85A30', this)"></div>
    <div class="color-btn" style="background:#EF9F27" onclick="setColor('#EF9F27', this)"></div>
    <div class="color-btn" style="background:#fff" onclick="setColor('#ffffff', this)"></div>
  </div>

  <div id="shape-picker">
    <button class="shape-btn active" onclick="setShape('sphere', this)" title="Sphere">●</button>
    <button class="shape-btn" onclick="setShape('box', this)" title="Box">■</button>
    <button class="shape-btn" onclick="setShape('ring', this)" title="Ring">○</button>
  </div>

  <div id="btn-photo" onclick="takePhoto()" title="Take photo"></div>
  <div id="marker-ref">Marker: Hiro pattern · <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" style="color:#9FE1CB" target="_blank">tap to open & print</a></div>
  <div id="flash"></div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;"
  >

    <a-marker preset="hiro" id="marker">

      <!-- ============================================================
           Object floats HIGH above the marker so it appears in the sky.
           position="0 HEIGHT 0" — increase Y to go higher.
           At ~1m print distance: Y=3 = ~3m above marker in real world.
           ============================================================ -->

      <!-- SPHERE -->
      <a-entity id="obj-sphere" position="0 5 0" visible="true">
        <a-sphere
          id="sphere"
          radius="0.6"
          color="#7F77DD"
          animation="property: rotation; to: 0 360 0; dur: 3000; loop: true; easing: linear"
          animation__pulse="property: scale; to: 1.15 1.15 1.15; dur: 1200; loop: true; dir: alternate; easing: easeInOutSine"
        ></a-sphere>
        <!-- Glow ring around sphere -->
        <a-torus
          color="#7F77DD"
          opacity="0.35"
          radius="0.9"
          radius-tubular="0.04"
          rotation="90 0 0"
          animation="property: rotation; from: 90 0 0; to: 90 360 0; dur: 2500; loop: true; easing: linear"
        ></a-torus>
        <!-- Light beam down to marker -->
        <a-cylinder
          color="#7F77DD"
          opacity="0.08"
          radius="0.15"
          height="5"
          position="0 -2.5 0"
        ></a-cylinder>
        <!-- Floating label -->
        <a-text
          value="AR Sky"
          align="center"
          position="0 1.1 0"
          scale="1.4 1.4 1.4"
          color="white"
          look-at="[camera]"
        ></a-text>
      </a-entity>

      <!-- BOX (hidden by default) -->
      <a-entity id="obj-box" position="0 5 0" visible="false">
        <a-box
          id="box"
          width="0.9" height="0.9" depth="0.9"
          color="#7F77DD"
          animation="property: rotation; to: 45 360 45; dur: 3500; loop: true; easing: linear"
        ></a-box>
        <a-cylinder
          color="#7F77DD"
          opacity="0.08"
          radius="0.15"
          height="5"
          position="0 -2.5 0"
        ></a-cylinder>
        <a-text
          value="AR Sky"
          align="center"
          position="0 1.1 0"
          scale="1.4 1.4 1.4"
          color="white"
          look-at="[camera]"
        ></a-text>
      </a-entity>

      <!-- RING (hidden by default) -->
      <a-entity id="obj-ring" position="0 5 0" visible="false">
        <a-torus
          id="ring"
          color="#7F77DD"
          radius="0.7"
          radius-tubular="0.1"
          animation="property: rotation; to: 360 360 0; dur: 3000; loop: true; easing: linear"
        ></a-torus>
        <!-- Inner ring -->
        <a-torus
          color="#7F77DD"
          opacity="0.4"
          radius="0.4"
          radius-tubular="0.05"
          animation="property: rotation; from: 0 0 0; to: -360 0 360; dur: 2000; loop: true; easing: linear"
        ></a-torus>
        <a-cylinder
          color="#7F77DD"
          opacity="0.08"
          radius="0.15"
          height="5"
          position="0 -2.5 0"
        ></a-cylinder>
        <a-text
          value="AR Sky"
          align="center"
          position="0 1.1 0"
          scale="1.4 1.4 1.4"
          color="white"
          look-at="[camera]"
        ></a-text>
      </a-entity>

    </a-marker>

    <a-entity camera id="camera"></a-entity>

  </a-scene>

  <script>
    // ============================================================
    // CONFIGURE HERE — change the label text
    // ============================================================
    const LABEL_TEXT = "AR Sky";   // text floating above the object
    const SKY_HEIGHT = 5;          // height above marker (meters) — increase to go higher
    // ============================================================

    let currentShape = 'sphere';
    let currentColor = '#7F77DD';

    const shapes = ['sphere', 'box', 'ring'];
    const colorTargets = {
      sphere: ['#sphere', 'a-torus'],
      box:    ['#box'],
      ring:   ['#ring', 'a-torus']
    };

    // Update label text from config
    document.querySelectorAll('a-text[value="AR Sky"]').forEach(el => {
      el.setAttribute('value', LABEL_TEXT);
    });

    // Update height from config
    document.querySelectorAll('[id^="obj-"]').forEach(el => {
      el.setAttribute('position', `0 ${SKY_HEIGHT} 0`);
      el.querySelector('a-cylinder')?.setAttribute('height', SKY_HEIGHT);
      el.querySelector('a-cylinder')?.setAttribute('position', `0 ${-SKY_HEIGHT/2} 0`);
    });

    function setShape(shape, btn) {
      currentShape = shape;
      shapes.forEach(s => {
        document.getElementById('obj-' + s).setAttribute('visible', s === shape);
      });
      document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function setColor(color, btn) {
      currentColor = color;

      // Update all shape colors
      document.querySelectorAll('a-sphere, a-box, a-torus, a-cylinder').forEach(el => {
        const op = el.getAttribute('opacity');
        if (!op || parseFloat(op) > 0.3) {
          el.setAttribute('color', color);
        } else {
          el.setAttribute('color', color);
        }
      });

      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // Marker detection feedback
    const marker = document.getElementById('marker');
    const status = document.getElementById('status');
    const hint   = document.getElementById('hint');

    marker.addEventListener('markerFound', () => {
      status.textContent = 'Marker detected — object is in the sky!';
      status.style.background = 'rgba(15, 110, 86, 0.75)';
      hint.textContent = 'Point camera up to see the object floating above';
    });

    marker.addEventListener('markerLost', () => {
      status.textContent = 'Point camera at the Hiro marker';
      status.style.background = 'rgba(0,0,0,0.6)';
      hint.textContent = 'Keep the marker in view to anchor the object';
    });

    // Take photo
    function takePhoto() {
      const flash = document.getElementById('flash');
      flash.style.opacity = '1';
      setTimeout(() => flash.style.opacity = '0', 100);

      const scene = document.querySelector('a-scene');
      scene.renderer.preserveDrawingBuffer = true;

      setTimeout(() => {
        try {
          const canvas = scene.canvas;
          const dataURL = canvas.toDataURL('image/png');
          const link = document.createElement('a');
          link.download = 'ar-photo.png';
          link.href = dataURL;
          link.click();
          status.textContent = 'Photo saved!';
          setTimeout(() => status.textContent = 'Marker detected — object is in the sky!', 2000);
        } catch(e) {
          status.textContent = 'Hold screen to save the photo';
        }
      }, 200);
    }
  </script>

</body>
</html>
