<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Image Target + SLAM Persistente</title>
  
  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  
  <script src="./bundle.js"></script>
</head>
<body>

  <a-scene 
  xrweb="local-tracking: true; disableWorldTracking: false;"
  loading-screen="enabled: false">
    
    <a-assets>
      <a-asset-item id="modelo" src="./public/assets/modelo.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>

    <a-named-image-target name="seu-panfleto.json" alvo-persistente>
      
      <a-box position="0 0.5 0" material="color: red;" scale="0.2 0.2 0.2"></a-box>
      
      <a-entity 
        gltf-model="#modelo" 
        scale="1 1 1" 
        position="0 0 0"
        visible="false">
      </a-entity>

    </a-named-image-target>

  </a-scene>

</body>
</html>
