<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>AR - Element Fire</title>

  <script src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async crossorigin="anonymous"
    data-preload-chunks="image">
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; }
    #status {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 20px;
      z-index: 9999;
      text-align: center;
      pointer-events: none;
    }
    #status.found { background: rgba(15,130,86,0.9); }
    #status.error { background: rgba(200,0,0,0.9); }
  </style>
</head>
<body>

  <div id="status">⏳ Carregando...</div>

  <!-- SEM xrweb aqui — engine iniciado manualmente no bundle.js -->
  <a-scene
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; antialias: true">

    <a-camera position="0 1.6 0"></a-camera>

    <a-named-image-target name="20_Element_Fire">
      <a-box
        position="0 0.15 0"
        scale="0.25 0.25 0.25"
        material="color: #ff6600; opacity: 0.95;"
        animation="property: rotation; to: 0 360 0; dur: 2000; loop: true; easing: linear">
      </a-box>
    </a-named-image-target>

  </a-scene>

  <script src="./bundle.js"></script>

</body>
</html>
