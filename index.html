<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanji AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: sans-serif;
}

#status{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  background:rgba(0,0,0,.7);
  color:white;
  padding:10px 20px;
  border-radius:20px;
}

#capture{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid white;
  background:white;
  z-index:9999;
}
</style>
</head>

<body>

<div id="status">
Aponte a câmera para o Kanji
</div>

<button id="capture"></button>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  color-space="sRGB"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets>
  </a-assets>

  <a-camera
      position="0 0 0"
      look-controls="enabled: false">
  </a-camera>

  <!-- Target 0 -->
  <a-entity mindar-image-target="targetIndex: 0">

      <!-- esfera -->
      <a-sphere
          id="orb"
          position="0 0.5 0"
          radius="0.25"
          color="#7F77DD"
          animation="
            property: rotation;
            to: 0 360 0;
            dur: 3000;
            loop: true;
            easing: linear;">
      </a-sphere>

      <!-- anel -->
      <a-torus
          position="0 0.5 0"
          radius="0.4"
          radius-tubular="0.02"
          color="#7F77DD"
          opacity="0.4"
          rotation="90 0 0"
          animation="
            property: rotation;
            from: 90 0 0;
            to: 90 360 0;
            dur: 2500;
            loop: true;
            easing: linear;">
      </a-torus>

      <!-- texto -->
      <a-text
          value="AR Sky"
          position="0 0.9 0"
          align="center"
          color="#FFFFFF"
          scale="0.8 0.8 0.8">
      </a-text>

  </a-entity>

</a-scene>

<script>

const target=document.querySelector('[mindar-image-target]');
const status=document.getElementById('status');

target.addEventListener("targetFound",()=>{
  status.innerHTML="Kanji detectado!";
});

target.addEventListener("targetLost",()=>{
  status.innerHTML="Aponte a câmera para o Kanji";
});

document.getElementById('capture').onclick=()=>{

  const scene=document.querySelector('a-scene');

  scene.renderer.preserveDrawingBuffer=true;

  setTimeout(()=>{

    const dataURL=scene.canvas.toDataURL("image/png");

    const a=document.createElement("a");
    a.href=dataURL;
    a.download="foto-ar.png";
    a.click();

  },200);

};

</script>

</body>
</html>
