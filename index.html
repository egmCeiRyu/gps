<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanji AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: sans-serif;
}

#status{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  background:rgba(0,0,0,.7);
  color:white;
  padding:10px 20px;
  border-radius:20px;
}

#capture{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid white;
  background:white;
  z-index:9999;
}
</style>
</head>

<body>

<div id="status">
Aponte a câmera para o Kanji
</div>

<button id="capture"></button>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  embedded
  color-space="sRGB"
  vr-mode-ui="enabled: false"
>

  <a-camera position="0 0 0"></a-camera>

  <!-- marcador -->
  <a-entity id="target" mindar-image-target="targetIndex: 0">
  </a-entity>

  <!-- objeto independente -->
  <a-assets>
      <a-asset-item id="meuModelo" src="modelo.glb"></a-asset-item>
  </a-assets>

  <a-entity
      gltf-model="#meuModelo"
      scale="0.3 0.3 0.3">
  </a-entity>

</a-scene>

<script>

const scene = document.querySelector("a-scene");
const target = document.getElementById("target");
const object = document.getElementById("persistentObject");

let placed = false;

target.addEventListener("targetFound", () => {

    if (placed) return;

    // posição mundial do marcador
    const pos = new THREE.Vector3();
    const quat = new THREE.Quaternion();

    target.object3D.getWorldPosition(pos);
    target.object3D.getWorldQuaternion(quat);

    // eleva o objeto acima do marcador
    pos.y += 0.5;

    object.object3D.position.copy(pos);
    object.object3D.quaternion.copy(quat);

    object.setAttribute("visible", true);

    // esconder o scanner
    target.setAttribute("visible", false);

    // esconder mensagem
    document.getElementById("status").style.display = "none";

    placed = true;

    console.log("Objeto fixado");

    // parar rastreamento do MindAR
    const arSystem = scene.systems["mindar-image-system"];
    if (arSystem) {
        arSystem.stop();
    }

});

</script>

</body>
</html>
